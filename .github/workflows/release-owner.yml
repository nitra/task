# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Реліз owner-застосунку (воркспейс owner/) — аналог release.yml для app.
# Тег owner-vX.Y.Z → GitHub-реліз "owner owner-vX.Y.Z" + підписаний DMG +
# updater-артефакти (owner має tauri-plugin-updater, useUpdater()).

name: Release Owner

on:
  push:
    tags:
      - 'owner-v*'

  workflow_dispatch: {}

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create or reuse release
        id: create-release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const params = { owner: context.repo.owner, repo: context.repo.repo };
            let release;
            try {
              release = (await github.rest.repos.getReleaseByTag({ ...params, tag })).data;
            } catch {
              release = (await github.rest.repos.createRelease({
                ...params,
                tag_name: tag,
                name: `owner ${tag}`,
                draft: false,
                prerelease: false,
                generate_release_notes: true,
              })).data;
            }
            return String(release.id);

  build-desktop:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write # OIDC-токен для автентифікації в Infisical
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Fetch Apple signing secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: 'oidc'
          domain: 'https://secret.7n.ai'
          project-slug: 'vitaliytv-kfse'
          identity-id: '53691c96-17d9-4389-b078-0f77073809ab'
          env-slug: 'main'
          secret-path: '/apple'

      - name: Fetch updater signing key from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: 'oidc'
          domain: 'https://secret.7n.ai'
          project-slug: 'vitaliytv-kfse'
          identity-id: '53691c96-17d9-4389-b078-0f77073809ab'
          env-slug: 'main'
          secret-path: '/updater'

      - uses: ./.github/actions/setup-bun-deps

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 # zizmor: ignore[cache-poisoning]
        with:
          workspaces: owner/src-tauri

      - name: Sync owner version from tag
        run: |
          VER="${GITHUB_REF_NAME#owner-v}"
          node -e "const fs=require('fs');const f='owner/src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(f));c.version=process.argv[1];fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n')" "$VER"
          echo "tauri.conf.json version → $VER"

      - name: Build and upload DMG
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: owner
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target universal-apple-darwin

      # app і owner ділять один репозиторій, тому GitHub-вбудований
      # /releases/latest/ неоднозначний між продуктами (див. tauri.mdc release —
      # той канон писаний під один продукт на репо). owner-latest — стабільний
      # службовий тег, який цей крок пересуває на свіжий latest.json щоразу;
      # updater застосунку owner (tauri.conf.json → plugins.updater.endpoints)
      # звертається саме сюди, а не в спільний /latest/.
      - name: Publish owner-latest updater channel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL_TITLE: 'owner auto-update channel (службовий, не для людей)'
          CHANNEL_NOTES: 'Стабільний тег для plugins.updater.endpoints у owner/src-tauri/tauri.conf.json. Автоматично пересувається кожним owner-v* релізом на свіжий latest.json. Дистрибутив бери з останнього справжнього owner-vX.Y.Z релізу.'
        run: |
          TAG="${GITHUB_REF_NAME}"
          CHANNEL="owner-latest"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" -p latest.json -D /tmp/updater-channel --clobber
          if gh release view "$CHANNEL" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$CHANNEL" /tmp/updater-channel/latest.json --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$CHANNEL" /tmp/updater-channel/latest.json --repo "$GITHUB_REPOSITORY" --title "$CHANNEL_TITLE" --notes "$CHANNEL_NOTES" --prerelease --target main
          fi
