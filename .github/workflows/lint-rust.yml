name: Lint Rust

on:
  workflow_dispatch: {}

  push:
    branches:
      - dev
      - main
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'

  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Системні залежності Tauri v2 на Linux (glib/gtk/webkit) — без них
      # clippy не збере src-tauri.
      - name: Install Tauri system deps
        run: >-
          sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev
          libgtk-3-dev librsvg2-dev libxdo-dev libssl-dev
          libayatana-appindicator3-dev

      # Кореневий Cargo workspace (rust/workspace_root): bare-команди з кореня
      # покривають усі члени — app/src-tauri, owner/src-tauri, owner/owner-llm.
      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
