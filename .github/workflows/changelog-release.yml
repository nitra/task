# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Автоматичний реліз із change-файлів: merge у main з {app,owner}/.changes/*.md →
# `n-cursor release` (бамп version + CHANGELOG.md + коміт "release: app@X, owner@Y" +
# теги app@X/owner@Y) → теги vX / owner-vX → dispatch release.yml /
# release-owner.yml (DMG-артефакти). Пуш тегів робиться GITHUB_TOKEN-ом і не
# тригерить workflows, тому build-workflow викликається явно через workflow_dispatch.

name: Changelog Release

on:
  push:
    branches:
      - main
    paths:
      - 'app/.changes/**'
      - 'owner/.changes/**'

  workflow_dispatch: {}

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  release:
    # Страховка від циклу при ручному пуші release-коміту (він теж матчить
    # paths, бо видаляє change-файли); пуші від GITHUB_TOKEN не тригерять і так.
    if: "!startsWith(github.event.head_commit.message, 'release:')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-deps
      - name: Configure git identity + push auth
        run: >-
          git config user.name "github-actions[bot]"

          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin "https://x-access-token:${{
          secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Run n-cursor release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npx n-cursor release

      - name: Detect produced release
        id: rel
        run: |
          SUBJ=$(git log -1 --pretty=%s)
          if ! echo "$SUBJ" | grep -q '^release:'; then
            echo "no pending change files — nothing released"
            exit 0
          fi
          # Суб'єкт "release: app@X, owner@Y" — межа слова відсікає owner@ від app@.
          if echo "$SUBJ" | grep -qE '(^release: |[ ,])app@'; then
            APP=$(node -p "require('./app/package.json').version")
            echo "app=$APP" >> "$GITHUB_OUTPUT"
            echo "released app@$APP"
          fi
          if echo "$SUBJ" | grep -qE '(^release: |[ ,])owner@'; then
            OWNER=$(node -p "require('./owner/package.json').version")
            echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
            echo "released owner@$OWNER"
          fi

      - name: Tag and push
        if: steps.rel.outputs.app || steps.rel.outputs.owner
        env:
          APP_VER: ${{ steps.rel.outputs.app }}
          OWNER_VER: ${{ steps.rel.outputs.owner }}
        run: |
          TAGS=()
          if [ -n "$APP_VER" ]; then
            git tag "app@$APP_VER" 2>/dev/null || true
            git tag "v$APP_VER"
            TAGS+=("refs/tags/app@$APP_VER" "refs/tags/v$APP_VER")
          fi
          if [ -n "$OWNER_VER" ]; then
            git tag "owner@$OWNER_VER" 2>/dev/null || true
            git tag "owner-v$OWNER_VER"
            TAGS+=("refs/tags/owner@$OWNER_VER" "refs/tags/owner-v$OWNER_VER")
          fi
          git push origin HEAD:main "${TAGS[@]}"

      - name: Dispatch DMG release build (app)
        if: steps.rel.outputs.app
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.rel.outputs.app }}
        run: gh workflow run release.yml --ref "v$VER"

      - name: Dispatch DMG release build (owner)
        if: steps.rel.outputs.owner
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.rel.outputs.owner }}
        run: gh workflow run release-owner.yml --ref "owner-v$VER"
