apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-pod
  namespace: default
---
# Dev pod потребує мінімальних прав — лише читати власний ServiceAccount token
# (для k8s join method при реєстрації Teleport node agent)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-pod
  namespace: default
rules:
  - apiGroups: ['']
    resources: [serviceaccounts/token]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-pod
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dev-pod
subjects:
  - kind: ServiceAccount
    name: dev-pod
    namespace: default
---
# Бекенд (nitra/task API) спавнить dev pods через k8s API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-backend
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-backend
  namespace: default
rules:
  - apiGroups: ['']
    resources: [pods]
    verbs: [get, list, watch, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-backend
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: task-backend
subjects:
  - kind: ServiceAccount
    name: task-backend
    namespace: default
