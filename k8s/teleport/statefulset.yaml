apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: teleport
  namespace: teleport
spec:
  # 2 репліки Auth+Proxy — можливо лише з PostgreSQL backend
  replicas: 2
  serviceName: teleport-headless
  selector:
    matchLabels:
      app: teleport
  template:
    metadata:
      labels:
        app: teleport
    spec:
      serviceAccountName: teleport
      containers:
        - name: teleport
          image: public.ecr.aws/gravitational/teleport-distroless:16
          args: ['start', '--config=/etc/teleport/teleport.yaml']
          ports:
            - name: web
              containerPort: 3080
            - name: auth
              containerPort: 3025
            - name: ssh
              containerPort: 3022
            - name: tunnel
              containerPort: 3024
          env:
            # CNPG створює цей secret автоматично при ініціалізації кластера
            - name: PG_CONN_STRING
              valueFrom:
                secretKeyRef:
                  name: teleport-postgres-app
                  key: uri
          volumeMounts:
            - name: config
              mountPath: /etc/teleport
              readOnly: true
            - name: data
              mountPath: /var/lib/teleport
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3080
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3080
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: teleport-config
            items:
              - key: teleport.yaml
                path: teleport.yaml

  # Кожна репліка отримує власний PV для локальних host-сертифікатів
  # (основний стан кластера зберігається у PostgreSQL)
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
